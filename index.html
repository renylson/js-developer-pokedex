<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <!-- Normalize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;500;700&display=swap" rel="stylesheet">

    <link rel="icon" href="data:,">

    <!-- Nosso CSS -->
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/pokedex.css">
</head>

<body>
    <section class="content">
        <h1>Pokedex</h1>

        <ol id="pokemonList" class="pokemons">
            <!-- ..... Pokemons here ..... -->
        </ol>

        <div class="pagination">
            <button id="loadMoreButton" type="button">
                Load More
            </button>
        </div>
    </section>

    <div id="pokemonModal" class="modal hidden" aria-hidden="true">
        <div id="modalContent" class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalName">
            <button id="modalCloseButton" class="modal-close" type="button" aria-label="Close">
                x
            </button>

            <header class="modal-header">
                <div class="modal-title">
                    <h2 id="modalName" class="modal-name"></h2>
                    <span id="modalNumber" class="modal-number"></span>
                    <ol id="modalTypes" class="types modal-types"></ol>
                </div>
            </header>

            <div class="modal-hero">
                <img id="modalImage" class="modal-image" src="" alt="">
            </div>

            <div class="modal-body">
                <section class="modal-section">
                    <h3>Abilities</h3>
                    <ol id="modalAbilities" class="modal-abilities"></ol>
                </section>

                <section class="modal-section">
                    <h3>Stats</h3>
                    <ol id="modalStats" class="modal-stats"></ol>
                </section>
            </div>
        </div>
    </div>

    <!-- Nosso JS -->
    <script src="/assets/js/pokemon-model.js"></script>
    <script src="/assets/js/poke-api.js"></script>
    <script src="/assets/js/main.js"></script>
</body>

</html>
